<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gauntlety</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #ddd;
    font-family: "Courier New", monospace;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  h1 {
    margin: 8px 0;
    font-size: 18px;
    letter-spacing: 4px;
    color: #f0c040;
    text-shadow: 2px 2px 0 #804000;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border: 2px solid #444;
    box-shadow: 0 0 20px #222;
  }
  .hud {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    letter-spacing: 2px;
  }
  #controls {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
  }
  #controls button {
    background: #222;
    color: #f0c040;
    border: 2px solid #444;
    font-family: "Courier New", monospace;
    font-size: 20px;
    cursor: pointer;
    user-select: none;
  }
  #controls button:active {
    background: #444;
  }
  #controls .up    { grid-column: 2; grid-row: 1; }
  #controls .left  { grid-column: 1; grid-row: 2; }
  #controls .down  { grid-column: 2; grid-row: 3; }
  #controls .right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="wrap">
  <h1>GAUNTLETY &mdash; LEVEL 1</h1>
  <canvas id="game" width="832" height="576"></canvas>
  <div class="hud">ARROWS / WASD TO MOVE</div>
  <div id="controls">
    <button class="up"    data-dir="up"    aria-label="Up">&#9650;</button>
    <button class="left"  data-dir="left"  aria-label="Left">&#9664;</button>
    <button class="down"  data-dir="down"  aria-label="Down">&#9660;</button>
    <button class="right" data-dir="right" aria-label="Right">&#9654;</button>
  </div>
</div>

<script>
(() => {
  const TILE = 32;
  const COLS = 26;
  const ROWS = 18;

  // Tile legend:
  //  # = wall
  //  . = floor
  //  D = door (decorative for now)
  //  X = exit
  const LEVEL = [
    "##########################",
    "#........................#",
    "#.######..######..######.#",
    "#.######..######..######.#",
    "#........................#",
    "#.######..######..######.#",
    "#.######..######..######.#",
    "#........................D",
    "#.######..######..######.#",
    "#.######..######..######.#",
    "#........................#",
    "#.######..######..######.#",
    "#.######..######..######.#",
    "#........................#",
    "#.######..######..######.#",
    "#.######..######..######.#",
    "#.......................X#",
    "##########################",
  ];

  const PLAYER_PALETTE = {
    O: "#1a1208",
    C: "#c02020",
    S: "#e0b090",
    E: "#101010",
    T: "#f0f0f0",
    J: "#3050a0",
    B: "#604020",
    F: "#402810",
  };

  const PLAYER_SPRITE_DOWN = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSESSESSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_UP = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSSSSSSSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_LEFT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSESSSSSSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_RIGHT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSSSSSESO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_DOWN_LEFT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSESSESSSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_DOWN_RIGHT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSSESSESO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_UP_LEFT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OCSSSSSSSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITE_UP_RIGHT = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSSSSSSCO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const PLAYER_SPRITES = {
    down:       PLAYER_SPRITE_DOWN,
    up:         PLAYER_SPRITE_UP,
    left:       PLAYER_SPRITE_LEFT,
    right:      PLAYER_SPRITE_RIGHT,
    down_left:  PLAYER_SPRITE_DOWN_LEFT,
    down_right: PLAYER_SPRITE_DOWN_RIGHT,
    up_left:    PLAYER_SPRITE_UP_LEFT,
    up_right:   PLAYER_SPRITE_UP_RIGHT,
  };

  const player = { x: 2 * TILE, y: 1 * TILE, facing: "down" };
  const PLAYER_SIZE = 32;
  const SPEED = 2;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  function drawFloor(x, y) {
    // Bright supermarket linoleum
    ctx.fillStyle = "#e8e8e0";
    ctx.fillRect(x, y, TILE, TILE);

    // Speckle for tiled flooring
    ctx.fillStyle = "#d0d0c8";
    for (let py = 0; py < TILE; py += 8) {
      for (let px = 0; px < TILE; px += 8) {
        if (((px + py) >> 3) % 2 === 0) {
          ctx.fillRect(x + px, y + py, 4, 4);
        }
      }
    }

    // Tile grout
    ctx.fillStyle = "#b8b8b0";
    ctx.fillRect(x, y + TILE - 1, TILE, 1);
    ctx.fillRect(x + TILE - 1, y, 1, TILE);
  }

  // Meat shelf: outer wall. Chrome shelf frame with packaged red meat.
  function drawMeatShelf(x, y) {
    // Shelf back panel
    ctx.fillStyle = "#c8ccd0";
    ctx.fillRect(x, y, TILE, TILE);

    // Two stacked meat packages
    const packs = [
      { py: 3 },
      { py: 17 },
    ];
    for (const p of packs) {
      // White styrofoam tray
      ctx.fillStyle = "#f8f8f8";
      ctx.fillRect(x + 2, y + p.py, TILE - 4, 12);
      // Red meat
      ctx.fillStyle = "#a01818";
      ctx.fillRect(x + 4, y + p.py + 2, TILE - 8, 6);
      // White marbling/fat
      ctx.fillStyle = "#e8b0a0";
      ctx.fillRect(x + 6, y + p.py + 3, 3, 1);
      ctx.fillRect(x + 14, y + p.py + 5, 4, 1);
      ctx.fillRect(x + 22, y + p.py + 4, 3, 1);
      // Plastic wrap highlight
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(x + 4, y + p.py + 1, 6, 1);
      // Price sticker
      ctx.fillStyle = "#f0c040";
      ctx.fillRect(x + TILE - 9, y + p.py + 8, 6, 3);
    }

    // Chrome shelf rails
    ctx.fillStyle = "#909498";
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillRect(x, y + 14, TILE, 2);
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x, y, TILE, 1);
    ctx.fillRect(x, y + 14, TILE, 1);
  }

  // Aisle stack: inner wall. Stacked cardboard boxes of food.
  function drawBoxAisle(x, y) {
    // Floor underneath shows through edges; fill base
    ctx.fillStyle = "#a87038";
    ctx.fillRect(x, y, TILE, TILE);

    // Two stacked boxes (top, bottom)
    const boxes = [
      { py: 0,  c1: "#c08850", c2: "#8a5520", label: "#e84040" }, // cereal-ish
      { py: 16, c1: "#b07840", c2: "#7a4818", label: "#3060c0" }, // pasta-ish
    ];
    for (const b of boxes) {
      // Box face
      ctx.fillStyle = b.c1;
      ctx.fillRect(x + 1, y + b.py + 1, TILE - 2, 14);
      // Box edges/shadow
      ctx.fillStyle = b.c2;
      ctx.fillRect(x + 1, y + b.py + 14, TILE - 2, 1);
      ctx.fillRect(x + TILE - 2, y + b.py + 1, 1, 14);
      // Box top flap line
      ctx.fillStyle = b.c2;
      ctx.fillRect(x + 1, y + b.py + 4, TILE - 2, 1);
      // Label patch
      ctx.fillStyle = b.label;
      ctx.fillRect(x + 6, y + b.py + 6, TILE - 12, 6);
      // Label text shimmer
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(x + 8, y + b.py + 8, 4, 1);
      ctx.fillRect(x + 16, y + b.py + 8, 6, 1);
    }
  }

  function isOuterWall(c, r) {
    return c === 0 || c === COLS - 1 || r === 0 || r === ROWS - 1;
  }

  function drawDoor(x, y) {
    drawFloor(x, y);
    ctx.fillStyle = "#803010";
    ctx.fillRect(x + 4, y + 2, TILE - 8, TILE - 4);
    ctx.fillStyle = "#b04820";
    ctx.fillRect(x + 6, y + 4, TILE - 12, TILE - 8);
    ctx.fillStyle = "#f0c040";
    ctx.fillRect(x + TILE - 10, y + TILE / 2 - 1, 3, 3);
  }

  function drawSprite(sprite, palette, dx, dy, scale = 2) {
    let lastKey = null;
    for (let r = 0; r < sprite.length; r++) {
      const row = sprite[r];
      for (let c = 0; c < row.length; c++) {
        const key = row[c];
        if (key === ".") continue;
        if (key !== lastKey) {
          ctx.fillStyle = palette[key];
          lastKey = key;
        }
        ctx.fillRect(dx + c * scale, dy + r * scale, scale, scale);
      }
    }
  }

  function drawExit(x, y) {
    drawFloor(x, y);
    // Glowing exit tile
    ctx.fillStyle = "#204020";
    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
    ctx.fillStyle = "#40c040";
    ctx.fillRect(x + 6, y + 6, TILE - 12, TILE - 12);
    ctx.fillStyle = "#a0ffa0";
    ctx.fillRect(x + 12, y + 12, TILE - 24, TILE - 24);
  }

  function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = LEVEL[r][c];
        const x = c * TILE;
        const y = r * TILE;
        switch (ch) {
          case "#":
            if (isOuterWall(c, r)) drawMeatShelf(x, y);
            else drawBoxAisle(x, y);
            break;
          case "D": drawDoor(x, y); break;
          case "X": drawExit(x, y); break;
          default:  drawFloor(x, y); break;
        }
      }
    }

    drawSprite(PLAYER_SPRITES[player.facing], PLAYER_PALETTE, Math.round(player.x), Math.round(player.y), 2);
  }

  function isBlocked(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
    return LEVEL[row][col] === "#";
  }

  function collides(px, py) {
    const x0 = px;
    const y0 = py;
    const x1 = px + PLAYER_SIZE - 1;
    const y1 = py + PLAYER_SIZE - 1;
    const c0 = Math.floor(x0 / TILE);
    const c1 = Math.floor(x1 / TILE);
    const r0 = Math.floor(y0 / TILE);
    const r1 = Math.floor(y1 / TILE);
    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        if (isBlocked(c, r)) return true;
      }
    }
    return false;
  }

  const keysDown = new Set();
  let buttonDir = null;

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d"].includes(k)) {
      keysDown.add(k);
      e.preventDefault();
    }
  });
  window.addEventListener("keyup", (e) => {
    keysDown.delete(e.key.toLowerCase());
  });
  window.addEventListener("blur", () => keysDown.clear());

  document.querySelectorAll("#controls button").forEach((btn) => {
    const dir = btn.dataset.dir;
    const press = (e) => { e.preventDefault(); buttonDir = dir; };
    const release = () => { if (buttonDir === dir) buttonDir = null; };
    btn.addEventListener("mousedown", press);
    btn.addEventListener("mouseup", release);
    btn.addEventListener("mouseleave", release);
    btn.addEventListener("touchstart", press, { passive: false });
    btn.addEventListener("touchend", release);
    btn.addEventListener("touchcancel", release);
  });

  function tick() {
    let dx = 0, dy = 0;
    if (keysDown.has("arrowup")    || keysDown.has("w")) dy -= SPEED;
    if (keysDown.has("arrowdown")  || keysDown.has("s")) dy += SPEED;
    if (keysDown.has("arrowleft")  || keysDown.has("a")) dx -= SPEED;
    if (keysDown.has("arrowright") || keysDown.has("d")) dx += SPEED;
    if (buttonDir === "up")    dy -= SPEED;
    if (buttonDir === "down")  dy += SPEED;
    if (buttonDir === "left")  dx -= SPEED;
    if (buttonDir === "right") dx += SPEED;

    if (dx !== 0 || dy !== 0) {
      const vert = dy < 0 ? "up" : dy > 0 ? "down" : "";
      const horiz = dx < 0 ? "left" : dx > 0 ? "right" : "";
      player.facing = vert && horiz ? `${vert}_${horiz}` : (vert || horiz);
    }

    if (dx !== 0 && !collides(player.x + dx, player.y)) player.x += dx;
    if (dy !== 0 && !collides(player.x, player.y + dy)) player.y += dy;

    render();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
