<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gauntlety</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #ddd;
    font-family: "Courier New", monospace;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  h1 {
    margin: 8px 0;
    font-size: 18px;
    letter-spacing: 4px;
    color: #f0c040;
    text-shadow: 2px 2px 0 #804000;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border: 2px solid #444;
    box-shadow: 0 0 20px #222;
  }
  .hud {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    letter-spacing: 2px;
  }
  #controls {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
  }
  #controls button {
    background: #222;
    color: #f0c040;
    border: 2px solid #444;
    font-family: "Courier New", monospace;
    font-size: 20px;
    cursor: pointer;
    user-select: none;
  }
  #controls button:active {
    background: #444;
  }
  #controls .up    { grid-column: 2; grid-row: 1; }
  #controls .left  { grid-column: 1; grid-row: 2; }
  #controls .down  { grid-column: 2; grid-row: 3; }
  #controls .right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="wrap">
  <h1>GAUNTLETY &mdash; LEVEL 1</h1>
  <canvas id="game" width="640" height="480"></canvas>
  <div class="hud">ARROWS / WASD TO MOVE</div>
  <div id="controls">
    <button class="up"    data-dir="up"    aria-label="Up">&#9650;</button>
    <button class="left"  data-dir="left"  aria-label="Left">&#9664;</button>
    <button class="down"  data-dir="down"  aria-label="Down">&#9660;</button>
    <button class="right" data-dir="right" aria-label="Right">&#9654;</button>
  </div>
</div>

<script>
(() => {
  const TILE = 32;
  const COLS = 20;
  const ROWS = 15;

  // Tile legend:
  //  # = wall
  //  . = floor
  //  D = door (decorative for now)
  //  X = exit
  const LEVEL = [
    "####################",
    "#........#.........#",
    "#........#.........#",
    "#..####..#..####...#",
    "#..#........#.#....#",
    "#..#..####..#.#....D",
    "#.....#..#....#....#",
    "####..#..#....######",
    "#.....#..#.........#",
    "#..####..######....#",
    "#.........#........#",
    "#..#####..#..####..#",
    "#......#.....#.....#",
    "#......#.....#....X#",
    "####################",
  ];

  const PLAYER_PALETTE = {
    O: "#1a1208",
    C: "#c02020",
    S: "#e0b090",
    E: "#101010",
    T: "#f0f0f0",
    J: "#3050a0",
    B: "#604020",
    F: "#402810",
  };

  const PLAYER_SPRITE_DOWN = [
    "................",
    "....OOOOOO......",
    "...OCCCCCCO.....",
    "..OCCCCCCCCO....",
    "..OCCCCCCCCO....",
    "..OOOOOOOOOOO...",
    "..OSSESSESSO....",
    "..OSSSSSSSSO....",
    "...OSSSSSSO.....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "..OBTTTTTTBO....",
    "...OJJJJJJO.....",
    "...OJJ..JJO.....",
    "...OFF..FFO.....",
    "...OOO..OOO.....",
  ];

  const player = { col: 2, row: 1 };

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  function drawFloor(x, y) {
    // Dark stone floor with grid speckle
    ctx.fillStyle = "#1a1208";
    ctx.fillRect(x, y, TILE, TILE);

    ctx.fillStyle = "#2a1d10";
    for (let py = 0; py < TILE; py += 8) {
      for (let px = 0; px < TILE; px += 8) {
        if (((px + py) >> 3) % 2 === 0) {
          ctx.fillRect(x + px, y + py, 4, 4);
        }
      }
    }

    // Subtle grid lines
    ctx.fillStyle = "#0e0904";
    ctx.fillRect(x, y + TILE - 1, TILE, 1);
    ctx.fillRect(x + TILE - 1, y, 1, TILE);
  }

  function drawWall(x, y) {
    // Brick wall: base, highlight, mortar
    ctx.fillStyle = "#5a5a78";
    ctx.fillRect(x, y, TILE, TILE);

    ctx.fillStyle = "#7878a0";
    // Brick rows: row 0 offset, row 1 not, alternating
    const brickH = 8;
    const brickW = 16;
    for (let row = 0; row < TILE / brickH; row++) {
      const offset = (row % 2) * (brickW / 2);
      for (let col = -1; col < TILE / brickW + 1; col++) {
        const bx = x + col * brickW + offset;
        const by = y + row * brickH;
        ctx.fillRect(bx + 1, by + 1, brickW - 2, brickH - 2);
      }
    }

    // Top highlight
    ctx.fillStyle = "#a0a0c8";
    ctx.fillRect(x, y, TILE, 2);
    // Bottom shadow
    ctx.fillStyle = "#2a2a40";
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
  }

  function drawDoor(x, y) {
    drawFloor(x, y);
    ctx.fillStyle = "#803010";
    ctx.fillRect(x + 4, y + 2, TILE - 8, TILE - 4);
    ctx.fillStyle = "#b04820";
    ctx.fillRect(x + 6, y + 4, TILE - 12, TILE - 8);
    ctx.fillStyle = "#f0c040";
    ctx.fillRect(x + TILE - 10, y + TILE / 2 - 1, 3, 3);
  }

  function drawSprite(sprite, palette, dx, dy, scale = 2) {
    let lastKey = null;
    for (let r = 0; r < sprite.length; r++) {
      const row = sprite[r];
      for (let c = 0; c < row.length; c++) {
        const key = row[c];
        if (key === ".") continue;
        if (key !== lastKey) {
          ctx.fillStyle = palette[key];
          lastKey = key;
        }
        ctx.fillRect(dx + c * scale, dy + r * scale, scale, scale);
      }
    }
  }

  function drawExit(x, y) {
    drawFloor(x, y);
    // Glowing exit tile
    ctx.fillStyle = "#204020";
    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
    ctx.fillStyle = "#40c040";
    ctx.fillRect(x + 6, y + 6, TILE - 12, TILE - 12);
    ctx.fillStyle = "#a0ffa0";
    ctx.fillRect(x + 12, y + 12, TILE - 24, TILE - 24);
  }

  function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = LEVEL[r][c];
        const x = c * TILE;
        const y = r * TILE;
        switch (ch) {
          case "#": drawWall(x, y); break;
          case "D": drawDoor(x, y); break;
          case "X": drawExit(x, y); break;
          default:  drawFloor(x, y); break;
        }
      }
    }

    drawSprite(PLAYER_SPRITE_DOWN, PLAYER_PALETTE, player.col * TILE, player.row * TILE, 2);
  }

  function isBlocked(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
    return LEVEL[row][col] === "#";
  }

  function move(dx, dy) {
    const nc = player.col + dx;
    const nr = player.row + dy;
    if (isBlocked(nc, nr)) return;
    player.col = nc;
    player.row = nr;
    render();
  }

  const DIRS = {
    up:    [ 0, -1],
    down:  [ 0,  1],
    left:  [-1,  0],
    right: [ 1,  0],
  };

  window.addEventListener("keydown", (e) => {
    let dir = null;
    switch (e.key) {
      case "ArrowUp": case "w": case "W": dir = "up"; break;
      case "ArrowDown": case "s": case "S": dir = "down"; break;
      case "ArrowLeft": case "a": case "A": dir = "left"; break;
      case "ArrowRight": case "d": case "D": dir = "right"; break;
    }
    if (dir) {
      e.preventDefault();
      const [dx, dy] = DIRS[dir];
      move(dx, dy);
    }
  });

  document.querySelectorAll("#controls button").forEach((btn) => {
    btn.addEventListener("click", () => {
      const [dx, dy] = DIRS[btn.dataset.dir];
      move(dx, dy);
    });
  });

  render();
})();
</script>
</body>
</html>
